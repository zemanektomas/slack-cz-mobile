name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install npm deps
        run: npm ci

      # Note: ESM `.js` extension patch on expo-sqlite/build/*.js (from memory
      # `reference_expo_sqlite_bug.md`) was originally a Windows + Node 22 dev
      # server workaround. Applying it in CI on Linux Hermes RELEASE build
      # turns out to BREAK expo-sqlite at runtime ('Error: Unimplemented' on
      # openDatabaseAsync). Local node_modules/expo-sqlite is NOT patched and
      # works fine in debug. Skipping the patch in CI as well.

      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --no-install --clean

      - name: Decode keystore
        run: |
          mkdir -p android/app
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | tr -d '\r\n\t ' | base64 -d > android/app/release.keystore
          test -s android/app/release.keystore || { echo "keystore is empty"; exit 1; }
          echo "Keystore decoded: $(wc -c < android/app/release.keystore) bytes"

      - name: Configure gradle signing
        run: |
          cat >> android/gradle.properties <<EOF
          MYAPP_RELEASE_STORE_FILE=release.keystore
          MYAPP_RELEASE_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          MYAPP_RELEASE_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          MYAPP_RELEASE_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Inject release signingConfig into build.gradle
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = 'android/app/build.gradle';
          let src = fs.readFileSync(path, 'utf8');

          const signingBlock = `
              release {
                  if (project.hasProperty('MYAPP_RELEASE_STORE_FILE')) {
                      storeFile file(MYAPP_RELEASE_STORE_FILE)
                      storePassword MYAPP_RELEASE_STORE_PASSWORD
                      keyAlias MYAPP_RELEASE_KEY_ALIAS
                      keyPassword MYAPP_RELEASE_KEY_PASSWORD
                  }
              }`;

          // 1) Inject `release { ... }` into signingConfigs block (idempotent)
          src = src.replace(
              /signingConfigs\s*\{([\s\S]*?)\n\s{4}\}/,
              (m, body) => {
                  if (body.includes('release {')) return m;
                  return `signingConfigs {${body}\n${signingBlock}\n    }`;
              }
          );

          // 2) In buildTypes.release { ... }, set signingConfig to release.
          //    Anchored regex: matches ONLY the release { ... } block (no nested braces),
          //    not the whole buildTypes prefix (which would trip on debug { ... } first).
          const buildTypesReleaseRe = /(buildTypes\s*\{[\s\S]*?release\s*\{)([^{}]*?)(signingConfig\s+signingConfigs\.\w+)/;
          if (!buildTypesReleaseRe.test(src)) {
              console.error('FATAL: could not locate buildTypes.release signingConfig line');
              process.exit(1);
          }
          src = src.replace(
              buildTypesReleaseRe,
              (m, prefix, body, sig) => `${prefix}${body}signingConfig signingConfigs.release`
          );

          fs.writeFileSync(path, src);

          // 3) Sanity-check the resulting file. The release buildtype must now
          //    point at signingConfigs.release, and signingConfigs must contain
          //    the release { storeFile ... } block we injected.
          const out = fs.readFileSync(path, 'utf8');
          const releaseBlockOk = /release\s*\{[^{}]*?signingConfig\s+signingConfigs\.release/.test(out);
          const signingDefOk = /signingConfigs\s*\{[\s\S]*?release\s*\{[\s\S]*?storeFile\s+file\(MYAPP_RELEASE_STORE_FILE\)/.test(out);
          if (!releaseBlockOk || !signingDefOk) {
              console.error('FATAL: build.gradle injection sanity-check failed', { releaseBlockOk, signingDefOk });
              process.exit(1);
          }
          console.log('Signing injection OK: buildTypes.release -> signingConfigs.release');
          EOF

      - name: Gradle assembleRelease
        env:
          # Metro bakes EXPO_PUBLIC_* env vars into the JS bundle at build time.
          # Anything sensitive cannot live here (visible in the APK).
          EXPO_PUBLIC_MAPY_CZ_API_KEY: ${{ secrets.EXPO_PUBLIC_MAPY_CZ_API_KEY }}
        run: |
          cd android
          ./gradlew app:assembleRelease -x lint -x test --no-daemon --stacktrace

      - name: Rename APK
        id: rename
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SRC="android/app/build/outputs/apk/release/app-release.apk"
          DEST="slackline-cz-${VERSION}.apk"
          cp "$SRC" "$DEST"
          ls -la "$DEST"
          echo "apk=$DEST" >> "$GITHUB_OUTPUT"

      - name: Upload artifact (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: slackline-cz-apk
          path: ${{ steps.rename.outputs.apk }}
          retention-days: 14

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.rename.outputs.apk }}
          generate_release_notes: true
          fail_on_unmatched_files: true
